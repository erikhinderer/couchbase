# Serves the built React app over HTTPS on port 443, and reverse-proxies
# /api and /ws to the backend so the whole UI is same-origin -- a page served
# over https:// cannot call http:// APIs or open ws:// (non-TLS) websockets in
# most modern browsers (mixed-content blocking), so proxying through this same
# nginx process on 443 is what makes "UI on 443 with SSL" actually work end to
# end, not just for the static assets.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Plain-HTTP requests get redirected to HTTPS rather than served -- the agent
# is meant to run on 443 with SSL only.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
